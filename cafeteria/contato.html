<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Café Tatuquas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/cafeteria.css">
</head>

<body class="bg-body-secondary">
    <header class="site-header shadow-sm">
        <h1 class="display-6 fw-bold">Café Tatuquas</h1>
        <a href="index.html" class="logo-link" aria-label="Página inicial do Café Tatuquas">
            <img src="assets/logotatuquas.png" alt="Logo do Café Tatuquas" class="site-logo">
        </a>
        <p class="lead">Entre em contato conosco</p>
        <p><a href="index.html" class="header-link">Voltar para Página Principal</a></p>
    </header>

    <nav class="site-menu">
        <a href="index.html">Início</a>
        <a href="menu.html">Cardápio</a>
        <a href="contato.html">Contato</a>
        <a href="../index.html">Portfólio</a>
    </nav>

    <main class="site-content">
        <section>
            <h2>Formulário de Contato</h2>
            <form action="#" method="post" class="bg-light p-3 rounded-3 border">
                <div>
                    <label for="nome">Nome Completo: *</label><br>
                    <input type="text" id="nome" name="nome" class="form-control" required>
                </div>
                <br>

                <div>
                    <label for="email">Email: *</label><br>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <br>

                <div>
                    <label for="telefone">Telefone:</label><br>
                    <input type="tel" id="telefone" name="telefone" class="form-control">
                </div>
                <br>

                <div>
                    <label for="assunto">Assunto: *</label><br>
                    <input type="text" id="assunto" name="assunto" class="form-control" required>
                </div>
                <br>

                <div>
                    <label for="mensagem">Mensagem: *</label><br>
                    <textarea id="mensagem" name="mensagem" rows="6" cols="40" class="form-control" required></textarea>
                </div>
                <br>

                <div>
                    <input type="submit" value="Enviar Mensagem" class="btn btn-primary">
                    <input type="reset" value="Limpar Formulário" class="btn btn-outline-secondary">
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p><a href="menu.html">Ver Menu</a> | <a href="../index.html">Voltar para o Portfólio</a></p>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Café Tatuquas</title>
    <link rel="stylesheet" href="assets/cafeteria.css">
</head>

<body>
    <header class="site-header">
        <h1>Café Tatuquas</h1>
        <a href="index.html" class="logo-link" aria-label="Página inicial do Café Tatuquas">
            <img src="assets/logotatuquas.png" alt="Logo do Café Tatuquas" class="site-logo">
        </a>
        <p>Entre em contato conosco</p>
        <p><a href="index.html" class="header-link">Voltar para Página Principal</a></p>
    </header>

    <nav class="site-menu">
        <a href="index.html">Início</a>
        <a href="menu.html">Cardápio</a>
        <a href="contato.html">Contato</a>
        <a href="../index.html">Portfólio</a>
    </nav>

    <main class="site-content">
        <section>
            <h2>Formulário de Contato</h2>
            <form action="#" method="post">
                <div>
                    <label for="nome">Nome Completo: *</label><br>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <br>

                <div>
                    <label for="email">Email: *</label><br>
                    <input type="email" id="email" name="email" required>
                </div>
                <br>

                <div>
                    <label for="telefone">Telefone:</label><br>
                    <input type="tel" id="telefone" name="telefone">
                </div>
                <br>

                <div>
                    <label for="assunto">Assunto: *</label><br>
                    <input type="text" id="assunto" name="assunto" required>
                </div>
                <br>

                <div>
                    <label for="mensagem">Mensagem: *</label><br>
                    <textarea id="mensagem" name="mensagem" rows="6" cols="40" required></textarea>
                </div>
                <br>

                <div>
                    <input type="submit" value="Enviar Mensagem">
                    <input type="reset" value="Limpar Formulário">
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p><a href="menu.html">Ver Menu</a> | <a href="../index.html">Voltar para o Portfólio</a></p>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio 9 - Validacao com Regex</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="container">
        <h1>Desafio 9 - Validador Regex</h1>
        <p class="subtitle">Preencha os dados e clique em validar.</p>

        <form id="validacao-form" novalidate>
            <div class="field">
                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" autocomplete="name" />
                <small id="nome-msg" class="message"></small>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="text" autocomplete="email" />
                <small id="email-msg" class="message"></small>
            </div>

            <div class="field">
                <label for="cpf">CPF</label>
                <input id="cpf" name="cpf" type="text" inputmode="numeric" placeholder="000.000.000-00" />
                <small id="cpf-msg" class="message"></small>
            </div>

            <button type="submit">Validar</button>
        </form>

        <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="script.js"></script>
</body>

</html>

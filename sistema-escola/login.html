<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistema Escola</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold text-primary">Sistema Escola</span>
            <span class="badge text-bg-primary">Area de Login</span>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 text-center mb-3">Sistema da Escola</h1>
                        <p class="text-muted text-center">Entre com email e senha.</p>

                        <form id="formLogin" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input id="email" type="email" class="form-control" required />
                            </div>
                            <div class="mb-2">
                                <label for="senha" class="form-label">Senha</label>
                                <input id="senha" type="password" class="form-control" required />
                            </div>
                            <small id="erroLogin" class="text-danger d-block mb-3"></small>
                            <button class="btn btn-primary w-100" type="submit">Entrar</button>
                        </form>

                        <div class="mt-4 small text-muted">
                            Teste com:<br />
                            teste@escola.com / 123456<br />
                            andre@escola.com / senha123
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="usuarios.js"></script>
    <script src="login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escola - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body class="escola-bg">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <section class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h1 class="h3 fw-bold mb-2">Sistema da Escola</h1>
                        <p class="text-muted mb-4">Entre com seu e-mail e senha para acessar o perfil.</p>

                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>

                            <div class="mb-2">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" required>
                            </div>

                            <p id="erroSenha" class="small text-danger mb-3"></p>

                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>

                    <div class="mt-4 small text-muted">
                        Teste com:<br />
                        teste@escola.com / 123456<br />
                        andre@escola.com / senha123
                    </div>

                </section>
            </div>
        </div>
    </main>

    <script src="usuarios.js"></script>
    <script src="login.js"></script>
</body>

</html>

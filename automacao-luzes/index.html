<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automacao de Luzes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-light">
    <main class="container py-4">
        <h1 class="h2 fw-bold text-primary mb-3">Central de Luzes da Casa</h1>
        <p id="status" class="alert alert-info">Escolha um comodo para ligar ou desligar.</p>

        <section class="acoes">
            <button class="btn btn-primary" data-acao="ligar" data-comodo="quarto">Ligar quarto</button>
            <button class="btn btn-outline-secondary" data-acao="desligar" data-comodo="quarto">Desligar quarto</button>

            <button class="btn btn-primary" data-acao="ligar" data-comodo="sala">Ligar sala</button>
            <button class="btn btn-outline-secondary" data-acao="desligar" data-comodo="sala">Desligar sala</button>

            <button class="btn btn-primary" data-acao="ligar" data-comodo="cozinha">Ligar cozinha</button>
            <button class="btn btn-outline-secondary" data-acao="desligar" data-comodo="cozinha">Desligar
                cozinha</button>
        </section>

        <section class="casa">
            <div class="comodo" data-comodo="quarto">Quarto</div>
            <div class="comodo" data-comodo="sala">Sala</div>
            <div class="comodo" data-comodo="cozinha">Cozinha</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
